name: Static Analysis

on: ['push', 'pull_request']

jobs:
  pint:
    runs-on: ubuntu-latest

    name: Pint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: zip
          tools: composer
          coverage: none

      - name: Install PHP dependencies
        run: composer update --prefer-stable --no-interaction --prefer-dist --no-progress --ansi

      - name: Run Pint
        run: composer lint -- --ansi

  phpstan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dependency-version: [prefer-lowest, prefer-stable]

    name: PHPStan (${{ matrix.dependency-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer
          coverage: none

      - name: Install Dependencies
        run: composer update --${{ matrix.dependency-version }} --no-interaction --prefer-dist --no-progress --ansi

      - name: Run PHPStan
        run: composer analyse -- --no-progress --ansi
